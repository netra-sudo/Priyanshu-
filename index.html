<!DOCTYPE html>
<html>
<head>
  <title>For Priyanshu </title>

  <style>
    body {
      text-align: center;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
    }

    h1 { margin-top: 60px; font-size: 42px; }
    h2 { margin-top: 15px; }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
    }

    #yes { background-color: #28a745; color: white; }
    #no {
      background-color: #dc3545;
      color: white;
      position: absolute;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .character {
      font-size: 60px;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }
  </style>
</head>

<body>

  <!--  Music -->
  <audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="character"></div>

  <h1>Hey Priyanshu </h1>
  <h2>You know I want something soo i made this</h2>
  <h2>Now this bear and I are stuck on you </h2>
  <h2>You can try pressing NO… but good luck  because you can't say no to me</h2>
  <h2>So… will you be mine? </h2>

  <button id="yes" onclick="yes()">YES </button>
  <button id="no" onmouseover="move()">NO </button>

  <script>
    function yes() {
      document.body.innerHTML = `
        <h1>Waittt </h1>
        <h2>Before you celebrate… one last thing </h2>
        <h2> Bola tha na haan boldega</h2>
      `;

      setTimeout(() => {
        document.body.innerHTML = `
          <h1>Okay now officially </h1>
          <div style="font-size:70px;"></div>
          <h2>Netra is REALLYYY happy now </h2>
          <h2>And just so you know...</h2>
          <h2><b>I genuinely like you a lot </b></h2>
          <h2>Good choice, Priyanshu jii</h2>
        `;
      }, 2500);
    }

    function move() {
      let x = Math.random() * (window.innerWidth - 100);
      let y = Math.random() * (window.innerHeight - 100);
      let noBtn = document.getElementById("no");
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    window.onload = function() {
      let music = document.getElementById("bgMusic");
      music.play().catch(() => {
        document.body.addEventListener("click", () => music.play());
      });
    }

    setInterval(() => {
      let heart = document.createElement("div");
      heart.innerHTML = "";
      heart.className = "heart";
      heart.style.left = Math.random() * window.innerWidth + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }, 300);
  </script>

</body>
</html>
